name: Java CI with Maven

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B -ntp verify
    - name: upload test diffs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-diffs
        path: |
          pdfbox1-layout/*.diff.png
          pdfbox2-layout/*.diff.png
          pdfbox3-layout/*.diff.png
